workflows:
  ios-build:
    name: StudentLink iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.studentlink.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: ./node_modules/.bin/cap add ios || true
      - name: Sync Capacitor
        script: ./node_modules/.bin/cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Build IPA (unsigned)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportPath $CM_BUILD_DIR/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
