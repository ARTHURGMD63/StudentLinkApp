workflows:
  android-build:
    name: StudentLink Android
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Android SDK
        script: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
